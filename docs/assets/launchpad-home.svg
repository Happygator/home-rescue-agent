<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="card" x="-8%" y="-30%" width="116%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="cta" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <rect width="390" height="844" fill="#F8FAFC"/>

  <!-- Header -->
  <rect width="390" height="100" fill="url(#hdr)"/>
  <text x="22" y="29" fill="#FFFFFF" font-size="13" font-weight="600">9:41</text>
  <rect x="312" y="26" width="3" height="4" fill="#FFFFFF"/>
  <rect x="318" y="23" width="3" height="7" fill="#FFFFFF"/>
  <rect x="324" y="20" width="3" height="10" fill="#FFFFFF"/>
  <rect x="350" y="20" width="20" height="10" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
  <rect x="352" y="22" width="13" height="6" rx="1" fill="#FFFFFF"/>
  <rect x="371" y="22.5" width="2" height="5" rx="1" fill="#FFFFFF"/>
  <text x="22" y="81" fill="#FFFFFF" font-size="17" font-weight="700">HomeRescue</text>
  <!-- account avatar -->
  <circle cx="360" cy="74" r="15" fill="#334155"/>
  <text x="360" y="79" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">A</text>

  <!-- Hero icon -->
  <circle cx="195" cy="200" r="46" fill="#EFF6FF"/>
  <g transform="translate(173.4,178.4) scale(1.85)" fill="#2563EB">
    <path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/>
  </g>

  <!-- Title + subtitle -->
  <text x="195" y="296" font-size="26" font-weight="700" fill="#0F172A" text-anchor="middle">What&#8217;s broken?</text>
  <text x="195" y="328" font-size="14" fill="#64748B" text-anchor="middle">Describe the problem and the assistant will</text>
  <text x="195" y="348" font-size="14" fill="#64748B" text-anchor="middle">walk you through the fix, step by step.</text>

  <!-- Primary CTA -->
  <rect x="24" y="384" width="342" height="58" rx="14" fill="url(#cta)" filter="url(#card)"/>
  <text x="208" y="420" font-size="16.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">Start a new issue</text>
  <!-- plus glyph -->
  <circle cx="120" cy="413" r="11" fill="#FFFFFF" fill-opacity="0.2"/>
  <rect x="114.5" y="412" width="11" height="2" rx="1" fill="#FFFFFF"/>
  <rect x="119" y="407.5" width="2" height="11" rx="1" fill="#FFFFFF"/>
  <text x="195" y="466" font-size="12.5" fill="#94A3B8" text-anchor="middle">Just describe it in your own words &#183; one photo optional</text>

  <!-- Quick-start chips -->
  <text x="24" y="516" font-size="12" font-weight="600" fill="#94A3B8" letter-spacing="0.4">OR JUMP STRAIGHT IN</text>
  <!-- Refrigerator -->
  <rect x="24" y="528" width="110" height="40" rx="20" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="79" y="553" font-size="13.5" font-weight="600" fill="#334155" text-anchor="middle">Refrigerator</text>
  <!-- Dishwasher -->
  <rect x="142" y="528" width="104" height="40" rx="20" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="194" y="553" font-size="13.5" font-weight="600" fill="#334155" text-anchor="middle">Dishwasher</text>
  <!-- Washer -->
  <rect x="254" y="528" width="92" height="40" rx="20" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="300" y="553" font-size="13.5" font-weight="600" fill="#334155" text-anchor="middle">Washer</text>

  <!-- My issues entry (secondary, tickets live behind this) -->
  <rect x="24" y="690" width="342" height="84" rx="16" fill="#FFFFFF" stroke="#EAEEF3" filter="url(#card)"/>
  <!-- folder/list glyph -->
  <rect x="44" y="716" width="34" height="34" rx="9" fill="#EFF6FF"/>
  <rect x="52" y="725" width="18" height="2.4" rx="1.2" fill="#2563EB"/>
  <rect x="52" y="731.5" width="18" height="2.4" rx="1.2" fill="#2563EB"/>
  <rect x="52" y="738" width="12" height="2.4" rx="1.2" fill="#2563EB"/>
  <text x="92" y="725" font-size="15.5" font-weight="700" fill="#0F172A">My issues</text>
  <!-- count badge -->
  <rect x="170" y="713" width="58" height="20" rx="10" fill="#DBEAFE"/>
  <text x="199" y="727" font-size="11.5" font-weight="700" fill="#1D4ED8" text-anchor="middle">3 open</text>
  <text x="92" y="746" font-size="12.5" fill="#64748B">1 awaiting your input &#183; updated 2h ago</text>
  <!-- chevron -->
  <path d="M342 724 l8 8 l-8 8" fill="none" stroke="#CBD5E1" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Home indicator -->
  <rect x="131" y="828" width="128" height="5" rx="2.5" fill="#CBD5E1"/>
</svg>
