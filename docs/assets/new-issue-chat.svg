<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="card" x="-8%" y="-10%" width="116%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="390" height="844" fill="#F8FAFC"/>

  <!-- Header -->
  <rect width="390" height="100" fill="url(#hdr)"/>
  <text x="22" y="29" fill="#FFFFFF" font-size="13" font-weight="600">9:41</text>
  <rect x="312" y="26" width="3" height="4" fill="#FFFFFF"/>
  <rect x="318" y="23" width="3" height="7" fill="#FFFFFF"/>
  <rect x="324" y="20" width="3" height="10" fill="#FFFFFF"/>
  <rect x="350" y="20" width="20" height="10" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
  <rect x="352" y="22" width="13" height="6" rx="1" fill="#FFFFFF"/>
  <rect x="371" y="22.5" width="2" height="5" rx="1" fill="#FFFFFF"/>
  <text x="18" y="82" font-size="24" fill="#FFFFFF">&#8249;</text>
  <text x="40" y="81" fill="#FFFFFF" font-size="16" font-weight="700">New Issue</text>

  <!-- Sub-row: status -->
  <rect x="16" y="114" width="70" height="22" rx="11" fill="#F1F5F9"/>
  <circle cx="30" cy="125" r="3" fill="#94A3B8"/>
  <text x="40" y="129" font-size="11" font-weight="700" fill="#475569">INTAKE</text>
  <text x="96" y="130" font-size="12" fill="#94A3B8">Gathering appliance details&#8230;</text>

  <!-- Case summary (empty) -->
  <rect x="16" y="148" width="358" height="150" rx="14" fill="#FFFFFF" stroke="#EAEEF3" filter="url(#card)"/>
  <text x="30" y="172" font-size="13" font-weight="700" fill="#0F172A">Case summary</text>
  <text x="30" y="198" font-size="12.5" fill="#475569"><tspan font-weight="600">Appliance</tspan> &#8212; <tspan font-style="italic" fill="#94A3B8">not specified yet</tspan></text>
  <text x="30" y="222" font-size="12.5" fill="#475569"><tspan font-weight="600">Symptom</tspan> &#8212; <tspan font-style="italic" fill="#94A3B8">not described yet</tspan></text>
  <text x="30" y="246" font-size="12.5" fill="#475569"><tspan font-weight="600">Model</tspan> &#8212; <tspan font-style="italic" fill="#94A3B8">awaiting spec plate</tspan></text>
  <rect x="30" y="262" width="314" height="24" rx="7" fill="#EFF6FF"/>
  <text x="42" y="278" font-size="12" fill="#1E40AF"><tspan font-weight="700">Next &#8594;</tspan> Answer below to start diagnosis.</text>

  <!-- Chat -->
  <rect x="16" y="314" width="300" height="40" rx="14" fill="#FFFFFF" stroke="#EAEEF3"/>
  <text x="30" y="338" font-size="12" fill="#334155">Hi! I&#8217;m your Appliance Fixer assistant.</text>

  <rect x="16" y="362" width="344" height="104" rx="14" fill="#FFFFFF" stroke="#EAEEF3"/>
  <text x="30" y="384" font-size="12" fill="#334155">Let&#8217;s set up your issue. To start, tell me:</text>
  <text x="30" y="406" font-size="12" fill="#334155">1) What appliance is it (e.g. refrigerator)?</text>
  <text x="30" y="428" font-size="12" fill="#334155">2) What&#8217;s it doing wrong?</text>
  <text x="30" y="450" font-size="12" fill="#334155">3) The model number on the spec plate.</text>

  <rect x="16" y="474" width="324" height="40" rx="14" fill="#FFFFFF" stroke="#EAEEF3"/>
  <text x="30" y="498" font-size="12" fill="#334155">Or tap &#128247; to scan the plate and auto-fill.</text>

  <!-- Input bar -->
  <rect x="16" y="786" width="256" height="44" rx="22" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="32" y="812" font-size="13" fill="#94A3B8">Describe your appliance problem&#8230;</text>
  <rect x="280" y="786" width="40" height="44" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="300" y="814" font-size="16" text-anchor="middle">&#128247;</text>
  <circle cx="350" cy="808" r="20" fill="#2563EB"/>
  <text x="350" y="813" font-size="14" fill="#FFFFFF" text-anchor="middle">&#10148;</text>

  <!-- Home indicator -->
  <rect x="145" y="834" width="100" height="5" rx="2.5" fill="#CBD5E1"/>
</svg>
