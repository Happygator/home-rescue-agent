<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="card" x="-8%" y="-10%" width="116%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="390" height="844" fill="#F8FAFC"/>

  <!-- Header -->
  <rect width="390" height="100" fill="url(#hdr)"/>
  <text x="22" y="29" fill="#FFFFFF" font-size="13" font-weight="600">9:41</text>
  <rect x="312" y="26" width="3" height="4" fill="#FFFFFF"/>
  <rect x="318" y="23" width="3" height="7" fill="#FFFFFF"/>
  <rect x="324" y="20" width="3" height="10" fill="#FFFFFF"/>
  <rect x="350" y="20" width="20" height="10" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
  <rect x="352" y="22" width="13" height="6" rx="1" fill="#FFFFFF"/>
  <rect x="371" y="22.5" width="2" height="5" rx="1" fill="#FFFFFF"/>
  <text x="18" y="82" font-size="24" fill="#FFFFFF">&#8249;</text>
  <text x="40" y="81" fill="#FFFFFF" font-size="16" font-weight="700">New Issue</text>

  <!-- Title -->
  <text x="16" y="142" font-size="18" font-weight="700" fill="#0F172A">What&#8217;s going on with your appliance?</text>

  <!-- Helper text -->
  <text x="16" y="168" font-size="13" fill="#64748B">Describe what it&#8217;s doing wrong. Add a photo of the problem</text>
  <text x="16" y="186" font-size="13" fill="#64748B">or the spec plate if you can &#8212; it helps the assistant</text>
  <text x="16" y="204" font-size="13" fill="#64748B">diagnose faster.</text>

  <!-- Description field (filled state) -->
  <rect x="16" y="222" width="358" height="124" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="30" y="248" font-size="13.5" fill="#334155">The fridge is running but the fresh-food side is</text>
  <text x="30" y="270" font-size="13.5" fill="#334155">warm &#8212; freezer&#8217;s still cold. Started a couple</text>
  <text x="30" y="292" font-size="13.5" fill="#334155">of days ago.</text>
  <!-- caret -->
  <rect x="119" y="282" width="1.5" height="14" fill="#2563EB"/>

  <!-- Photo attached row -->
  <rect x="16" y="364" width="64" height="64" rx="10" fill="#E2E8F0"/>
  <!-- little appliance/photo glyph inside the thumbnail -->
  <rect x="28" y="378" width="40" height="36" rx="5" fill="#FFFFFF" stroke="#CBD5E1"/>
  <circle cx="40" cy="390" r="4" fill="#94A3B8"/>
  <path d="M30 412 L44 398 L54 408 L60 402 L66 412 Z" fill="#CBD5E1"/>
  <text x="92" y="392" font-size="13" fill="#334155">Photo attached</text>
  <text x="92" y="411" font-size="12" fill="#94A3B8">symptom.jpg &#183; will ride along on your first message</text>
  <text x="358" y="400" font-size="13" font-weight="600" fill="#2563EB" text-anchor="end">Remove</text>

  <!-- What happens next, inline note -->
  <rect x="16" y="452" width="358" height="64" rx="12" fill="#EFF6FF"/>
  <text x="30" y="478" font-size="12" fill="#1E40AF"><tspan font-weight="700">Start diagnosis</tspan> seeds this as your first chat</text>
  <text x="30" y="496" font-size="12" fill="#1E40AF">message and opens the chat &#8212; the assistant reads</text>
  <text x="30" y="514" font-size="12" fill="#1E40AF">your photo in context and kicks off the diagnosis.</text>

  <!-- Bottom bar -->
  <line x1="0" y1="784" x2="390" y2="784" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="16" y="796" width="358" height="48" rx="12" fill="#2563EB"/>
  <text x="195" y="825" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Start diagnosis</text>
</svg>
