<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="card" x="-8%" y="-30%" width="116%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.55" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="blob" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
  </defs>

  <rect width="390" height="844" fill="#F8FAFC"/>

  <!-- Aurora backdrop (blurred color blobs behind the hero) -->
  <g filter="url(#blob)" opacity="0.5">
    <circle cx="330" cy="205" r="105" fill="#93C5FD"/>
    <circle cx="60" cy="300" r="115" fill="#C4B5FD"/>
    <circle cx="320" cy="380" r="80" fill="#FCD34D"/>
    <circle cx="150" cy="180" r="70" fill="#A7F3D0"/>
  </g>

  <!-- Header -->
  <rect width="390" height="100" fill="url(#hdr)"/>
  <rect y="100" width="390" height="3" fill="url(#accent)"/>
  <text x="22" y="29" fill="#FFFFFF" font-size="13" font-weight="600">9:41</text>
  <rect x="312" y="26" width="3" height="4" fill="#FFFFFF"/>
  <rect x="318" y="23" width="3" height="7" fill="#FFFFFF"/>
  <rect x="324" y="20" width="3" height="10" fill="#FFFFFF"/>
  <rect x="350" y="20" width="20" height="10" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
  <rect x="352" y="22" width="13" height="6" rx="1" fill="#FFFFFF"/>
  <rect x="371" y="22.5" width="2" height="5" rx="1" fill="#FFFFFF"/>
  <text x="22" y="81" fill="#FFFFFF" font-size="17" font-weight="700">HomeRescue</text>
  <!-- account avatar -->
  <circle cx="360" cy="74" r="15" fill="url(#accent)"/>
  <text x="360" y="79" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">A</text>

  <!-- Hero icon (gradient badge, white wrench) -->
  <circle cx="195" cy="200" r="46" fill="url(#hero)" filter="url(#card)"/>
  <g transform="translate(173.4,178.4) scale(1.85)" fill="#FFFFFF">
    <path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/>
  </g>

  <!-- Title + subtitle -->
  <text x="195" y="296" font-size="26" font-weight="700" fill="#0F172A" text-anchor="middle">What&#8217;s broken?</text>
  <text x="195" y="328" font-size="14" fill="#64748B" text-anchor="middle">Describe the problem and the assistant will</text>
  <text x="195" y="348" font-size="14" fill="#64748B" text-anchor="middle">walk you through the fix, step by step.</text>

  <!-- Primary CTA -->
  <rect x="24" y="384" width="342" height="58" rx="14" fill="url(#cta)" filter="url(#card)"/>
  <text x="208" y="420" font-size="16.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">Start a new issue</text>
  <!-- plus glyph -->
  <circle cx="120" cy="413" r="11" fill="#FFFFFF" fill-opacity="0.25"/>
  <rect x="114.5" y="412" width="11" height="2" rx="1" fill="#FFFFFF"/>
  <rect x="119" y="407.5" width="2" height="11" rx="1" fill="#FFFFFF"/>
  <text x="195" y="466" font-size="12.5" fill="#94A3B8" text-anchor="middle">Just describe it in your own words &#183; one photo optional</text>

  <!-- Quick-start tiles -->
  <text x="24" y="510" font-size="12" font-weight="600" fill="#94A3B8" letter-spacing="0.4">OR JUMP STRAIGHT IN</text>

  <!-- Refrigerator (blue) -->
  <rect x="24" y="522" width="108" height="80" rx="16" fill="#EFF6FF" stroke="#DBEAFE"/>
  <g stroke="#2563EB" stroke-width="2" fill="none" stroke-linejoin="round">
    <rect x="66" y="540" width="24" height="32" rx="5"/>
    <line x1="66" y1="553" x2="90" y2="553"/>
  </g>
  <rect x="84" y="544" width="2.4" height="6" rx="1.2" fill="#2563EB"/>
  <rect x="84" y="557" width="2.4" height="7" rx="1.2" fill="#2563EB"/>
  <text x="78" y="592" font-size="12" font-weight="600" fill="#1D4ED8" text-anchor="middle">Refrigerator</text>

  <!-- Dishwasher (cyan) -->
  <rect x="141" y="522" width="108" height="80" rx="16" fill="#ECFEFF" stroke="#CFFAFE"/>
  <g stroke="#0891B2" stroke-width="2" fill="none" stroke-linejoin="round">
    <rect x="183" y="540" width="24" height="32" rx="5"/>
    <line x1="183" y1="549" x2="207" y2="549"/>
    <circle cx="195" cy="561" r="5.5"/>
  </g>
  <text x="195" y="592" font-size="12" font-weight="600" fill="#0E7490" text-anchor="middle">Dishwasher</text>

  <!-- Washer (violet) -->
  <rect x="258" y="522" width="108" height="80" rx="16" fill="#F5F3FF" stroke="#EDE9FE"/>
  <g stroke="#7C3AED" stroke-width="2" fill="none" stroke-linejoin="round">
    <rect x="300" y="540" width="24" height="32" rx="5"/>
    <line x1="300" y1="549" x2="324" y2="549"/>
    <circle cx="312" cy="560" r="7.5"/>
    <circle cx="312" cy="560" r="2.5" fill="#7C3AED" stroke="none"/>
  </g>
  <text x="312" y="592" font-size="12" font-weight="600" fill="#6D28D9" text-anchor="middle">Washer</text>

  <!-- Bottom tab bar -->
  <rect x="0" y="762" width="390" height="82" fill="#FFFFFF"/>
  <line x1="0" y1="762" x2="390" y2="762" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Tab 1: New (active) -->
  <circle cx="120" cy="792" r="15" fill="#2563EB"/>
  <rect x="113" y="791" width="14" height="2" rx="1" fill="#FFFFFF"/>
  <rect x="119" y="785" width="2" height="14" rx="1" fill="#FFFFFF"/>
  <text x="120" y="822" font-size="11" font-weight="700" fill="#2563EB" text-anchor="middle">New</text>
  <!-- Tab 2: My Issues -->
  <rect x="261" y="786" width="20" height="2.6" rx="1.3" fill="#94A3B8"/>
  <rect x="261" y="792" width="20" height="2.6" rx="1.3" fill="#94A3B8"/>
  <rect x="261" y="798" width="14" height="2.6" rx="1.3" fill="#94A3B8"/>
  <text x="270" y="822" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">My issues</text>

  <!-- Home indicator -->
  <rect x="131" y="832" width="128" height="4" rx="2" fill="#CBD5E1"/>
</svg>
