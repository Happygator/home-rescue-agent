<svg viewBox="0 0 820 945" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="820" height="945" fill="#F8FAFC"/>
  <text x="28" y="40" font-size="18" font-weight="700" fill="#0F172A">System Architecture &#8212; Mobile app over the existing ADK agent</text>

  <!-- ============ 1. COMPONENT VIEW ============ -->
  <text x="28" y="64" font-size="12.5" font-weight="700" fill="#64748B">1 &#183; Component view &#8212; responsibilities &amp; call seams</text>

  <!-- Frontend -->
  <rect x="28" y="80" width="220" height="300" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="138" y="108" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">Flutter app (iOS / Android)</text>
  <rect x="48" y="124" width="180" height="52" rx="8" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="138" y="146" font-size="12.5" font-weight="600" fill="#1E40AF" text-anchor="middle">Issues dashboard</text>
  <text x="138" y="164" font-size="11" fill="#3B82F6" text-anchor="middle">list + New Issue</text>
  <rect x="48" y="186" width="180" height="52" rx="8" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="138" y="208" font-size="12.5" font-weight="600" fill="#1E40AF" text-anchor="middle">Issue detail</text>
  <text x="138" y="226" font-size="11" fill="#3B82F6" text-anchor="middle">summary + chat</text>
  <rect x="48" y="248" width="180" height="52" rx="8" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="138" y="270" font-size="12.5" font-weight="600" fill="#1E40AF" text-anchor="middle">New Issue intake</text>
  <text x="138" y="288" font-size="11" fill="#3B82F6" text-anchor="middle">chat + plate scan</text>

  <!-- API layer -->
  <rect x="312" y="80" width="220" height="300" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="422" y="108" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">FastAPI backend</text>
  <text x="422" y="124" font-size="10.5" fill="#94A3B8" text-anchor="middle">app/fast_api_app.py</text>
  <rect x="332" y="140" width="180" height="86" rx="8" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="422" y="160" font-size="12" font-weight="700" fill="#047857" text-anchor="middle">NEW: /api/issues</text>
  <text x="342" y="180" font-size="10.5" fill="#065F46">GET  /api/issues</text>
  <text x="342" y="196" font-size="10.5" fill="#065F46">GET  /api/issues/{id}</text>
  <text x="342" y="212" font-size="10.5" fill="#065F46">POST /api/issues</text>
  <rect x="332" y="238" width="180" height="62" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/>
  <text x="422" y="258" font-size="12" font-weight="700" fill="#334155" text-anchor="middle">ADK (reused)</text>
  <text x="342" y="278" font-size="10.5" fill="#475569">POST /run_sse  (chat)</text>
  <text x="342" y="294" font-size="10.5" fill="#475569">/apps/.../sessions</text>

  <!-- Domain / data -->
  <rect x="596" y="80" width="196" height="300" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="694" y="108" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">Domain + data</text>
  <rect x="616" y="124" width="156" height="74" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/>
  <text x="694" y="146" font-size="12" font-weight="700" fill="#334155" text-anchor="middle">CaseStore</text>
  <text x="694" y="164" font-size="10.5" fill="#475569" text-anchor="middle">new / load / save</text>
  <text x="694" y="180" font-size="10.5" fill="#475569" text-anchor="middle">recap()</text>
  <rect x="616" y="210" width="156" height="58" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/>
  <text x="694" y="232" font-size="12" font-weight="700" fill="#334155" text-anchor="middle">root_agent + tools</text>
  <text x="694" y="250" font-size="10.5" fill="#475569" text-anchor="middle">get_fixes / safety</text>
  <rect x="616" y="280" width="156" height="40" rx="8" fill="#FEF9C3" stroke="#FDE68A"/>
  <text x="694" y="305" font-size="11.5" font-weight="600" fill="#854D0E" text-anchor="middle">SQLite + Gemini</text>

  <!-- Component arrows -->
  <line x1="248" y1="200" x2="310" y2="200" stroke="#64748B" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="310" y1="230" x2="250" y2="230" stroke="#64748B" stroke-width="2" marker-end="url(#ah)"/>
  <text x="279" y="190" font-size="9.5" fill="#94A3B8" text-anchor="middle">REST</text>
  <text x="279" y="248" font-size="9.5" fill="#94A3B8" text-anchor="middle">JSON / SSE</text>
  <line x1="532" y1="183" x2="614" y2="160" stroke="#64748B" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="532" y1="268" x2="614" y2="238" stroke="#64748B" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Component caption -->
  <text x="28" y="424" font-size="12" fill="#475569">The dashboard&#8217;s issue list and &#8220;next steps&#8221; are served by a thin <tspan font-weight="700">/api/issues</tspan> layer reading <tspan font-weight="700">CaseStore</tspan>; the chat reuses ADK&#8217;s existing <tspan font-weight="700">/run_sse</tspan>.</text>
  <text x="28" y="444" font-size="12" fill="#475569">Green = new code to write. Grey = already exists today. Boxes = responsibilities (not processes &#8212; see deployment view).</text>

  <!-- divider -->
  <line x1="28" y1="476" x2="792" y2="476" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ============ 2. DEPLOYMENT VIEW ============ -->
  <text x="28" y="506" font-size="12.5" font-weight="700" fill="#64748B">2 &#183; Deployment view &#8212; what runs where</text>
  <text x="28" y="524" font-size="10.5" fill="#94A3B8">solid box = a runtime boundary &#183; nesting = same process &#183; dashed = network hop / future</text>

  <!-- Mobile device -->
  <rect x="28" y="556" width="150" height="140" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="103" y="580" font-size="12.5" font-weight="700" fill="#0F172A" text-anchor="middle">Mobile device</text>
  <text x="103" y="596" font-size="10" fill="#94A3B8" text-anchor="middle">iOS / Android</text>
  <rect x="42" y="610" width="122" height="72" rx="8" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="103" y="634" font-size="11.5" font-weight="700" fill="#1E40AF" text-anchor="middle">Flutter app</text>
  <text x="103" y="650" font-size="9.5" fill="#3B82F6" text-anchor="middle">screens &#183; camera</text>
  <text x="103" y="664" font-size="9.5" fill="#3B82F6" text-anchor="middle">native share sheet</text>

  <!-- device <-> server network link -->
  <line x1="178" y1="618" x2="238" y2="618" stroke="#64748B" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="238" y1="636" x2="178" y2="636" stroke="#64748B" stroke-width="2" marker-end="url(#ah)"/>
  <text x="208" y="610" font-size="9" fill="#94A3B8" text-anchor="middle">REST + SSE</text>
  <text x="208" y="654" font-size="9" fill="#94A3B8" text-anchor="middle">HTTPS</text>

  <!-- App server: ONE process -->
  <rect x="240" y="540" width="340" height="320" rx="14" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="410" y="566" font-size="12.5" font-weight="700" fill="#0F172A" text-anchor="middle">App server &#8212; ONE Python process</text>
  <text x="410" y="582" font-size="9.5" fill="#94A3B8" text-anchor="middle">one container (e.g. Cloud Run)</text>

  <rect x="256" y="596" width="308" height="46" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/>
  <text x="410" y="615" font-size="11.5" font-weight="700" fill="#334155" text-anchor="middle">FastAPI (ASGI)</text>
  <text x="410" y="631" font-size="9.5" fill="#475569" text-anchor="middle">REST + SSE &#183; /api/issues &#183; /run_sse</text>

  <rect x="256" y="650" width="308" height="46" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/>
  <text x="410" y="669" font-size="11.5" font-weight="700" fill="#334155" text-anchor="middle">ADK runtime + root_agent + tools</text>
  <text x="410" y="685" font-size="9.5" fill="#475569" text-anchor="middle">SafetyGuard &#183; get_fixes &#183; MCP client</text>

  <rect x="256" y="704" width="178" height="46" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/>
  <text x="345" y="723" font-size="11.5" font-weight="700" fill="#334155" text-anchor="middle">CaseStore</text>
  <text x="345" y="739" font-size="9" fill="#475569" text-anchor="middle">new/load/save &#183; recap</text>

  <rect x="448" y="704" width="116" height="46" rx="8" fill="#E8EDF3" stroke="#CBD5E1"/>
  <text x="506" y="723" font-size="11.5" font-weight="700" fill="#334155" text-anchor="middle">SQLite</text>
  <text x="506" y="739" font-size="9" fill="#475569" text-anchor="middle">local file (.db)</text>

  <line x1="434" y1="727" x2="448" y2="727" stroke="#64748B" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="410" y1="642" x2="410" y2="649" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="410" y="784" font-size="9.5" font-style="italic" fill="#94A3B8" text-anchor="middle">all in-process &#8212; in-memory calls, no network between these</text>

  <!-- network boundary to external services -->
  <line x1="598" y1="556" x2="598" y2="800" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="598" y="550" font-size="9" fill="#94A3B8" text-anchor="middle">network</text>

  <!-- Gemini (external) -->
  <rect x="612" y="592" width="180" height="68" rx="12" fill="#FEF9C3" stroke="#FDE68A"/>
  <text x="702" y="616" font-size="12" font-weight="700" fill="#854D0E" text-anchor="middle">Gemini API</text>
  <text x="702" y="633" font-size="9.5" fill="#854D0E" text-anchor="middle">Google &#183; multimodal LLM</text>
  <text x="702" y="648" font-size="9" fill="#854D0E" text-anchor="middle">(model inference)</text>

  <!-- Manufacturer MCP server (external, future) -->
  <rect x="612" y="686" width="180" height="78" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-dasharray="5 3"/>
  <text x="702" y="712" font-size="11.5" font-weight="700" fill="#334155" text-anchor="middle">Manufacturer MCP server</text>
  <text x="702" y="729" font-size="9.5" fill="#94A3B8" text-anchor="middle">external &#183; per OEM</text>
  <text x="702" y="745" font-size="9.5" font-style="italic" fill="#94A3B8" text-anchor="middle">(future direction)</text>

  <!-- external network arrows -->
  <line x1="580" y1="662" x2="610" y2="634" stroke="#64748B" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#ah)"/>
  <text x="596" y="648" font-size="8.5" fill="#94A3B8" text-anchor="middle">HTTPS</text>
  <line x1="580" y1="690" x2="610" y2="716" stroke="#64748B" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#ah)"/>
  <text x="596" y="704" font-size="8.5" fill="#94A3B8" text-anchor="middle">MCP</text>

  <!-- Deployment caption -->
  <text x="28" y="888" font-size="11.5" fill="#475569">Deployment: the Flutter app runs on the device. Everything server-side &#8212; FastAPI, the ADK agent, and CaseStore &#8212;</text>
  <text x="28" y="906" font-size="11.5" fill="#475569">runs in ONE Python process, with SQLite as a local file. Network hops: app&#8596;server, Gemini, and (future) each OEM&#8217;s MCP server.</text>
  <text x="28" y="924" font-size="11.5" fill="#475569">The three server-side boxes in the component view above are these in-process parts &#8212; not separate services.</text>
</svg>
